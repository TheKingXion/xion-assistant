name: Build Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Placeholder Android artifact gate
        run: |
          mkdir -p dist/releases/mobile/android
          echo "Android Expo APK not implemented in v0.0.1" > dist/releases/mobile/android/README.txt
      - run: pnpm release:checksums dist/releases dist/releases/checksums.json
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-placeholder
          path: dist/releases
