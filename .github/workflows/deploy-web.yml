name: Deploy Web

on:
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @xion-assistant/web test
      - run: pnpm --filter @xion-assistant/web build
        env:
          VITE_PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      - name: Deploy Pages
        run: pnpm exec wrangler pages deploy apps/web/dist --project-name xion-assistant
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Validate web route
        run: curl --fail "${PUBLIC_WEB_URL}"
        env:
          PUBLIC_WEB_URL: ${{ vars.PUBLIC_WEB_URL }}
